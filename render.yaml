services:
  - type: web
    name: fundfacts-api
    runtime: python
    plan: starter
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: VECTOR_STORE_PROVIDER
        value: chroma_cloud
      - key: CHROMA_COLLECTION_NAME
        value: mutual_fund_faq_chunks
      - key: EMBEDDING_PROVIDER
        value: sentence_transformers
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIMENSIONS
        value: "384"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: THREAD_STORE
        value: sqlite
      - key: THREAD_DB_PATH
        value: /var/data/threads.db
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: fundfacts-threads
      mountPath: /var/data
      sizeGB: 1
