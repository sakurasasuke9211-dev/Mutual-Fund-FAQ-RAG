rag:
  retrieval:
    dense_top_k: 10
    sparse_top_k: 10
    hybrid_alpha: 0.5
    final_top_k: 3
    reranker_enabled: true
    reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
    min_rerank_score: -5.0
  generation:
    provider: groq
    model: llama-3.3-70b-versatile
    base_url: https://api.groq.com/openai/v1
    temperature: 0.1
    max_sentences: 3
    max_tokens: 256
    request_timeout_seconds: 30
